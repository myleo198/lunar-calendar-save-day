name: lunar_calendar_app
description: Lịch âm gia tộc - lưu giỗ chạp, sự kiện âm lịch, nhắc việc và đồng bộ Google Calendar.
publish_to: "none"
version: 15.0.0+150

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: 19.5.0
  timezone: 0.10.1
  http: ^1.6.0
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0
  tray_manager: ^0.5.2
  launch_at_startup: ^0.5.1
  package_info_plus: ^8.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - assets/icons/app_icon_256.png
    - assets/icons/app_icon.ico

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: false
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
